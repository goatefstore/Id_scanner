<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Scanner – Auto Fill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e1117;
            --surface: #161b27;
            --card: #1e2534;
            --border: rgba(255,255,255,0.08);
            --accent: #4ade80;
            --accent2: #60a5fa;
            --text: #e8eaf0;
            --muted: rgba(232,234,240,0.45);
            --red: #f87171;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Manjari', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 12px 32px;
            color: var(--text);
        }

        .header {
            width: 100%;
            max-width: 420px;
            padding: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #1d3557 0%, #457b9d 100%);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(96,165,250,0.25);
        }
        .header-text h1 {
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.03em;
        }
        .header-text p { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .ai-badge {
            margin-left: auto;
            background: rgba(74,222,128,0.12);
            border: 1px solid rgba(74,222,128,0.3);
            color: var(--accent);
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.08em;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .viewport-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1.586 / 1;
            background: #000;
            overflow: hidden;
        }
        #video, #canvas {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        #canvas { display: none; }

        .corners { position: absolute; inset: 0; pointer-events: none; }
        .c {
            position: absolute;
            width: 22px; height: 22px;
            border-color: var(--accent);
            border-style: solid;
            border-width: 0;
            opacity: 0.8;
        }
        .c.tl { top: 12px; left: 12px; border-top-width: 2px; border-left-width: 2px; border-radius: 4px 0 0 0; }
        .c.tr { top: 12px; right: 12px; border-top-width: 2px; border-right-width: 2px; border-radius: 0 4px 0 0; }
        .c.bl { bottom: 12px; left: 12px; border-bottom-width: 2px; border-left-width: 2px; border-radius: 0 0 0 4px; }
        .c.br { bottom: 12px; right: 12px; border-bottom-width: 2px; border-right-width: 2px; border-radius: 0 0 4px 0; }

        .scan-bar {
            position: absolute;
            left: 12px; right: 12px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scanMove 2.2s ease-in-out infinite;
            box-shadow: 0 0 8px var(--accent);
        }
        @keyframes scanMove {
            0%   { top: 12px; }
            50%  { top: calc(100% - 12px); }
            100% { top: 12px; }
        }

        .proc-overlay {
            position: absolute; inset: 0;
            background: rgba(14,17,23,0.85);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .proc-overlay.show { opacity: 1; pointer-events: all; }
        .ring {
            width: 44px; height: 44px;
            border: 3px solid rgba(74,222,128,0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .proc-text {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.06em;
        }

        .body { padding: 16px; }

        .btn-capture {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-family: 'Manjari', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.12s, box-shadow 0.12s;
            box-shadow: 0 4px 20px rgba(37,99,235,0.35);
        }
        .btn-capture:hover { box-shadow: 0 6px 24px rgba(37,99,235,0.5); }
        .btn-capture:active { transform: scale(0.97); }

        #result-panel { display: none; }
        #result-panel.show { display: block; }

        .fields-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }

        .field-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color 0.3s;
        }
        .field-row.filled { border-color: rgba(74,222,128,0.3); }
        .field-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 15px;
        }
        .fi-name { background: rgba(96,165,250,0.12); }
        .fi-type { background: rgba(251,146,60,0.12); }
        .fi-dob  { background: rgba(167,139,250,0.12); }

        .field-inner { flex: 1; min-width: 0; }
        .field-label {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .field-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 22px;
        }
        .field-value.empty {
            color: rgba(232,234,240,0.2);
            font-weight: 400;
            font-size: 13px;
        }
        .field-shimmer {
            height: 16px;
            border-radius: 6px;
            background: linear-gradient(90deg,
                rgba(255,255,255,0.05) 25%,
                rgba(255,255,255,0.1) 50%,
                rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            display: none;
        }
        .field-row.loading .field-value { display: none; }
        .field-row.loading .field-shimmer { display: block; }
        @keyframes shimmer { to { background-position: -200% 0; } }

        .status-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 12px;
            font-weight: 700;
            border: 1px solid transparent;
            min-height: 40px;
        }
        .status-bar.idle { background: rgba(96,165,250,0.08); border-color: rgba(96,165,250,0.2); color: var(--accent2); }
        .status-bar.ok   { background: rgba(74,222,128,0.08); border-color: rgba(74,222,128,0.2); color: var(--accent); }
        .status-bar.err  { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.2); color: var(--red); }
        .s-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .s-dot.blue { background: var(--accent2); }
        .s-dot.green { background: var(--accent); }
        .s-dot.red { background: var(--red); }

        .action-row { display: flex; gap: 8px; }
        .btn {
            flex: 1; padding: 12px 10px;
            border: none; border-radius: 12px;
            font-family: 'Manjari', sans-serif;
            font-size: 14px; font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: transform 0.1s, opacity 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-retake { background: rgba(255,255,255,0.07); color: var(--muted); border: 1px solid var(--border); }
        .btn-copy   { background: var(--accent); color: #0e1117; box-shadow: 0 3px 14px rgba(74,222,128,0.3); }
        .btn-copy:hover { box-shadow: 0 4px 20px rgba(74,222,128,0.45); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        #toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--accent); color: #0e1117;
            padding: 10px 22px; border-radius: 30px;
            font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
            opacity: 0; pointer-events: none;
            transition: opacity 0.22s, transform 0.22s;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .hidden { display: none !important; }
        .mt { margin-top: 14px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="3"/>
            <path d="M7 10h4M7 14h2M17 10h-3"/>
        </svg>
    </div>
    <div class="header-text">
        <h1>ID SCANNER</h1>
        <p>ഓട്ടോ ഫിൽ – AI powered</p>
    </div>
    <div class="ai-badge">CLAUDE VISION</div>
</div>

<div class="card">
    <div class="viewport-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="corners">
            <div class="c tl"></div><div class="c tr"></div>
            <div class="c bl"></div><div class="c br"></div>
            <div class="scan-bar" id="scan-bar"></div>
        </div>
        <div class="proc-overlay" id="proc-overlay">
            <div class="ring"></div>
            <div class="proc-text">READING ID…</div>
        </div>
    </div>

    <div class="body">
        <button class="btn-capture" id="capture-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
            </svg>
            സ്കാൻ ചെയ്യൂ
        </button>

        <div id="result-panel" class="mt">
            <div class="status-bar idle" id="status-bar">
                <div class="s-dot blue"></div>
                <span>AI വിവരങ്ങൾ വായിക്കുന്നു…</span>
            </div>

            <div class="fields-grid">
                <div class="field-row loading" id="row-name">
                    <div class="field-icon fi-name">👤</div>
                    <div class="field-inner">
                        <div class="field-label">പേര് / Name</div>
                        <div class="field-value empty" id="val-name">—</div>
                        <div class="field-shimmer"></div>
                    </div>
                </div>
                <div class="field-row loading" id="row-type">
                    <div class="field-icon fi-type">🪪</div>
                    <div class="field-inner">
                        <div class="field-label">ഐഡി തരം / ID Type</div>
                        <div class="field-value empty" id="val-type">—</div>
                        <div class="field-shimmer"></div>
                    </div>
                </div>
                <div class="field-row loading" id="row-dob">
                    <div class="field-icon fi-dob">🎂</div>
                    <div class="field-inner">
                        <div class="field-label">ജനന തീയതി / Date of Birth</div>
                        <div class="field-value empty" id="val-dob">—</div>
                        <div class="field-shimmer"></div>
                    </div>
                </div>
            </div>

            <div class="action-row">
                <button class="btn btn-retake" id="retake-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                        <path d="M1 4v6h6M23 20v-6h-6"/>
                        <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                    </svg>
                    വീണ്ടും
                </button>
                <button class="btn btn-copy" id="copy-btn" disabled>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                        <path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    കോപ്പി ചെയ്യൂ
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toast">കോപ്പി ചെയ്തു ✓</div>

<script>
const video       = document.getElementById('video');
const canvas      = document.getElementById('canvas');
const captureBtn  = document.getElementById('capture-btn');
const retakeBtn   = document.getElementById('retake-btn');
const copyBtn     = document.getElementById('copy-btn');
const resultPanel = document.getElementById('result-panel');
const procOverlay = document.getElementById('proc-overlay');
const scanBar     = document.getElementById('scan-bar');
const statusBar   = document.getElementById('status-bar');
const toast       = document.getElementById('toast');

const fields = {
    name: { row: document.getElementById('row-name'), val: document.getElementById('val-name') },
    type: { row: document.getElementById('row-type'), val: document.getElementById('val-type') },
    dob:  { row: document.getElementById('row-dob'),  val: document.getElementById('val-dob')  },
};

let extractedData = null;

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        });
        video.srcObject = stream;
    } catch (e) {
        alert('ക്യാമറ ആക്സസ് ചെയ്യാൻ സാധിച്ചില്ല: ' + e.message);
    }
}

captureBtn.addEventListener('click', async () => {
    const ctx = canvas.getContext('2d');
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 400;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const base64 = canvas.toDataURL('image/jpeg', 0.92).split(',')[1];

    video.style.display = 'none';
    canvas.style.display = 'block';
    scanBar.style.display = 'none';
    captureBtn.classList.add('hidden');
    resultPanel.classList.add('show');
    procOverlay.classList.add('show');

    Object.values(fields).forEach(f => {
        f.row.classList.add('loading');
        f.row.classList.remove('filled');
        f.val.textContent = '—';
        f.val.className = 'field-value empty';
    });
    setStatus('idle', 'AI വിവരങ്ങൾ വായിക്കുന്നു…');
    copyBtn.disabled = true;
    extractedData = null;

    await extractWithAI(base64);
});

async function extractWithAI(base64) {
    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 300,
                messages: [{
                    role: 'user',
                    content: [
                        {
                            type: 'image',
                            source: { type: 'base64', media_type: 'image/jpeg', data: base64 }
                        },
                        {
                            type: 'text',
                            text: `Look at this ID card image and extract exactly 3 fields.
Return ONLY a raw JSON object with no markdown, no backticks, no explanation:
{"name":"full name on the card or null","id_type":"one of: Aadhaar Card | Driving License | PAN Card | Voter ID | Passport | Other | null","dob":"date of birth in DD/MM/YYYY format or null"}
If a field is not visible or unclear, use null.`
                        }
                    ]
                }]
            })
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error.message);

        const raw = (data.content?.[0]?.text || '{}').replace(/```json|```/gi, '').trim();
        const parsed = JSON.parse(raw);

        procOverlay.classList.remove('show');

        await fillField('name', parsed.name,    300);
        await fillField('type', parsed.id_type, 550);
        await fillField('dob',  parsed.dob,     800);

        extractedData = parsed;
        copyBtn.disabled = false;
        setStatus('ok', 'വിജയകരമായി വായിച്ചു ✓');

    } catch (err) {
        procOverlay.classList.remove('show');
        Object.values(fields).forEach(f => {
            f.row.classList.remove('loading');
            f.val.textContent = 'കണ്ടെത്തിയില്ല';
            f.val.className = 'field-value empty';
        });
        setStatus('err', 'വായിക്കാൻ സാധിച്ചില്ല. വ്യക്തമായ ഫോട്ടോ ഉപയോഗിക്കുക.');
        console.error(err);
    }
}

function fillField(key, value, delay) {
    return new Promise(resolve => {
        setTimeout(() => {
            const f = fields[key];
            f.row.classList.remove('loading');
            if (value && value !== 'null') {
                f.val.textContent = value;
                f.val.className = 'field-value';
                f.row.classList.add('filled');
            } else {
                f.val.textContent = 'കണ്ടെത്തിയില്ല';
                f.val.className = 'field-value empty';
            }
            resolve();
        }, delay);
    });
}

function setStatus(type, msg) {
    statusBar.className = 'status-bar ' + type;
    const dot = type === 'ok' ? 'green' : type === 'err' ? 'red' : 'blue';
    statusBar.innerHTML = `<div class="s-dot ${dot}"></div><span>${msg}</span>`;
}

retakeBtn.addEventListener('click', () => {
    canvas.style.display = 'none';
    video.style.display = 'block';
    scanBar.style.display = '';
    captureBtn.classList.remove('hidden');
    resultPanel.classList.remove('show');
    copyBtn.disabled = true;
    extractedData = null;
});

copyBtn.addEventListener('click', () => {
    if (!extractedData) return;
    const text =
        `Name: ${extractedData.name || '—'}\n` +
        `ID Type: ${extractedData.id_type || '—'}\n` +
        `Date of Birth: ${extractedData.dob || '—'}`;

    if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(text).then(showToast).catch(() => fallback(text));
    } else {
        fallback(text);
    }
});

function fallback(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast(); } catch {}
    document.body.removeChild(ta);
}

function showToast() {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
}

window.onload = startCamera;
</script>
</body>
</html>
